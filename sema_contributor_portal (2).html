<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sema Contributor Studio</title>
<style>
:root{
  --ink:#111827;
  --muted:#667085;
  --soft:#f6f7f9;
  --panel:#ffffff;
  --line:#e4e7ec;
  --teal:#0f766e;
  --teal-2:#12b3a8;
  --blue:#2563eb;
  --gold:#b7791f;
  --rose:#b42318;
  --green:#087f5b;
  --shadow:0 16px 40px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--ink);
  background:var(--soft);
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app{width:100%;min-height:100vh;margin:0;padding:0;display:grid;grid-template-columns:288px minmax(0,1fr);gap:0}
.sidebar,.topbar,.card,.task-board,.workbench,.modal-card{background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.sidebar{border-radius:0;padding:18px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;background:#0b1220;color:#fff;border-color:#111827;border-width:0 1px 0 0;box-shadow:none}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.mark{width:42px;height:42px;border-radius:12px;background:#fff;color:#0b1220;display:grid;place-items:center;font-weight:900;font-size:1.2rem}
.brand h1{font-size:1rem;margin:0;line-height:1.1}.brand p{margin:3px 0 0;color:#98a2b3;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
.nav{display:grid;gap:7px}
.nav button{border:0;background:transparent;color:#cbd5e1;border-radius:12px;padding:11px 12px;text-align:left;font-weight:850;display:flex;align-items:center;gap:10px}
.nav button:hover,.nav button.active{background:#1f2937;color:#fff}
.icon{width:24px;height:24px;border-radius:8px;background:#111827;border:1px solid #344054;display:grid;place-items:center;font-size:.72rem;font-weight:900;color:#d1e9ff}
.side-note{margin-top:auto;background:#111827;color:#fff;border:1px solid #344054;border-radius:15px;padding:14px;overflow:hidden;position:relative}
.side-note:after{display:none}
.side-note span{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:#c9d2df;font-weight:900}
.side-note strong{display:block;margin-top:8px;font-size:1.25rem;line-height:1.15}
.main{min-width:0;display:grid;gap:18px;padding:20px 24px 28px}
.topbar{border-radius:16px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px}
.topbar h2{margin:0;font-size:1.25rem}.topbar p{margin:4px 0 0;color:var(--muted);font-size:.9rem}
.profile-pill{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 8px 7px 12px;font-weight:850}
.avatar{width:32px;height:32px;border-radius:50%;background:#fbf0dc;color:#875a18;display:grid;place-items:center}
.btn{border:1px solid transparent;border-radius:11px;padding:10px 13px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:40px}
.btn-primary{background:#111827;color:#fff}.btn-secondary{background:#fff;border-color:var(--line);color:var(--ink)}.btn-danger{background:#fff;border-color:#efc7c1;color:var(--rose)}
.grid{display:grid;gap:16px;align-items:start}.dash{grid-template-columns:minmax(0,1fr) 330px}.metrics{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{border-radius:16px;padding:16px}
.card h3{margin:0;font-size:1rem}.card p,.muted{margin:6px 0 0;color:var(--muted);line-height:1.48}
.metric .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:900}.metric .num{font-size:2rem;font-weight:950;margin-top:7px}.metric .hint{font-size:.8rem;color:var(--muted);font-weight:750;margin-top:4px}
.kpi-strip{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}
.kpi{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px;min-height:92px}
.kpi .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:900}.kpi .num{font-size:1.45rem;font-weight:950;margin-top:6px}.kpi .hint{font-size:.76rem;color:var(--muted);font-weight:750;margin-top:4px}
.home-grid{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(320px,.8fr);gap:16px}
.action-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.action-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;display:grid;gap:8px}
.action-card strong{font-size:1rem}.action-card span{color:var(--muted);font-size:.84rem;line-height:1.4}
.tool-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.tool-pill{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px;font-weight:850;color:#344054;font-size:.84rem}
.ops-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.ops-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;display:grid;gap:10px}
.ops-card h3,.ops-card h4{margin:0}.ops-card p{margin:0;color:var(--muted);font-size:.86rem;line-height:1.45}
.role-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.role-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:12px}
.role-card strong{display:block}.role-card span{display:block;color:var(--muted);font-size:.82rem;margin-top:5px;line-height:1.35}
.task-board{border-radius:18px;padding:16px}.section-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.section-head h3{margin:0;font-size:1.1rem}.section-head p{margin:5px 0 0;color:var(--muted);font-size:.9rem}
.missions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.mission{border:1px solid var(--line);border-radius:15px;padding:14px;background:#fff;display:grid;gap:12px}
.mission strong{font-size:1.02rem}.mission p{margin:0;color:var(--muted);font-size:.88rem;line-height:1.45}.mission .meta{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.8rem;font-weight:850}
.mission.active{border-color:#98a2b3;background:#f9fafb}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 9px;background:#f5f1e7;color:#695f4d;font-size:.76rem;font-weight:900}
.badge.good{background:#ecfdf3;color:var(--green)}.badge.warn{background:#fffaeb;color:#8a5a10}.badge.hot{background:#eff8ff;color:#175cd3}
.workbench{border-radius:16px;display:grid;grid-template-columns:280px minmax(0,1fr);overflow:hidden}
.guide{background:#f9fafb;border-right:1px solid var(--line);padding:16px}.guide h3{margin:0 0 8px}.guide ol{padding-left:18px;margin:12px 0 0;color:#485366;font-weight:700;line-height:1.45}.guide li+li{margin-top:8px}
.work{padding:18px}.lang-row{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.pill{border:1px solid var(--line);border-radius:999px;padding:8px 10px;background:#fff;color:#596477;font-weight:850;font-size:.84rem}.pill.active{background:#e8f4f2;border-color:rgba(15,118,110,.3);color:var(--teal)}
.language-switcher{display:grid;grid-template-columns:minmax(220px,340px) auto;gap:10px;align-items:end;margin:12px 0}.language-switcher label{margin:0 0 6px}.language-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding-bottom:1px}
.source{background:#f9fafb;border:1px solid var(--line);border-radius:14px;padding:15px;font-weight:850;line-height:1.55;margin:12px 0}.source small{display:block;margin-top:8px;color:var(--muted);font-weight:750}
.toolbar{display:grid;grid-template-columns:minmax(0,1fr) 180px 160px;gap:10px;margin:12px 0}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;font-weight:900;color:#596477}.tab.active{background:#18233b;color:#fff;border-color:#18233b}
.corpus-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.corpus-card{border:1px solid var(--line);border-radius:13px;background:#fff;padding:12px;min-height:106px;display:flex;flex-direction:column;gap:8px}
.corpus-card strong{font-size:.96rem}.corpus-card span{color:var(--muted);font-size:.8rem;line-height:1.35}.corpus-card .foot{margin-top:auto;display:flex;justify-content:space-between;gap:8px;align-items:center}
.split{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px}
.tool-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.tool-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;display:grid;gap:10px}
.tool-card h4{margin:0;font-size:.98rem}.tool-card p{margin:0;color:var(--muted);font-size:.86rem;line-height:1.45}
.tool-card .state{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:auto}
.schema{font-family:Consolas,Menlo,monospace;background:#111827;color:#dbe7ff;border-radius:13px;padding:14px;overflow:auto;font-size:.78rem;line-height:1.5}
.verify-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.verify-rule{border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px}
.verify-rule strong{display:block}.verify-rule span{display:block;color:var(--muted);font-size:.82rem;margin-top:4px;line-height:1.4}
.meter{height:10px;background:#ebe7dc;border-radius:999px;overflow:hidden}.meter span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold))}
.studio-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px}
.record-console{border:1px solid var(--line);border-radius:16px;background:#fff;padding:16px}
.record-target{border:1px solid #d0d5dd;border-radius:16px;background:#f9fafb;padding:22px;margin:14px 0}
.record-target strong{display:block;font-size:1.3rem;line-height:1.35}.record-target span{display:block;margin-top:10px;color:var(--muted);font-weight:800}
.control-bar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
.audio-meter{display:grid;grid-template-columns:repeat(24,1fr);gap:3px;height:46px;align-items:end;margin:14px 0;padding:10px;border:1px solid var(--line);border-radius:14px;background:#fff}
.audio-meter i{display:block;background:#111827;border-radius:999px;min-height:6px}
label{display:block;margin:14px 0 7px;font-weight:900}textarea,input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;color:var(--ink);outline:none}textarea{min-height:132px;resize:vertical;line-height:1.5}textarea:focus,input:focus,select:focus{border-color:var(--teal-2);box-shadow:0 0 0 4px rgba(20,163,154,.15)}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.queue{display:grid;gap:10px}.queue-item{border:1px solid var(--line);border-radius:13px;background:#fff;padding:12px}.queue-item strong{display:block}.queue-item span{display:block;color:var(--muted);font-size:.84rem;margin-top:4px;line-height:1.4}
.progress{height:8px;background:#ece8dc;border-radius:999px;overflow:hidden;margin-top:10px}.bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--gold))}
.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{text-align:left;border-bottom:1px solid var(--line);padding:10px 8px}th{font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.empty{padding:26px;border:1px dashed #d1cabb;border-radius:14px;background:#fffdf8;text-align:center;color:var(--muted);font-weight:800}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:999px;padding:12px 16px;font-weight:900;opacity:0;transition:.18s;z-index:10}.toast.show{opacity:1}
.modal{position:fixed;inset:0;background:rgba(18,24,38,.68);display:none;align-items:center;justify-content:center;padding:18px;z-index:9}.modal.show{display:flex}.modal-card{width:min(680px,100%);border-radius:18px;padding:18px}
@media(max-width:1050px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}.main{padding:14px}.dash,.workbench,.split,.studio-grid,.home-grid{grid-template-columns:1fr}.guide{border-right:0;border-bottom:1px solid var(--line)}.corpus-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.tool-grid,.verify-grid,.kpi-strip,.ops-grid,.role-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:760px){.topbar{align-items:flex-start;flex-direction:column}.metrics,.missions,.corpus-grid,.toolbar,.control-bar,.language-switcher,.action-grid,.tool-list,.kpi-strip,.ops-grid,.role-grid{grid-template-columns:1fr}.profile-pill{width:100%;justify-content:space-between}.actions .btn{width:100%}}
</style>
</head>

  const byUnit=["word","phrase","sentence","term","idiom","proverb"].map(u=>({unit:u,count:items.filter(i=>i.unit===u).length}));
  $("#view").innerHTML=`<div class="grid dash"><div class="grid"><section class="card"><div class="section-head"><div><h3>Language coverage</h3><p>Operational table for the Sema team.</p></div><button class="btn btn-primary" id="export">Export approved JSON</button></div><div class="table-wrap"><table><tr><th>Language</th><th>Total</th><th>Approved</th><th>Pending</th></tr>${byLang.map(r=>`<tr><td>${r.label}</td><td>${r.total}</td><td>${r.approved}</td><td>${r.pending}</td></tr>`).join("")}</table></div></section><section class="card"><div class="section-head"><div><h3>Corpus inventory</h3><p>The portal is designed to grow from a starter list into thousands, then millions, of words and expressions.</p></div><button class="btn btn-secondary" id="adminCorpus">Manage corpus</button></div><div class="table-wrap"><table><tr><th>Unit</th><th>Items</th></tr>${byUnit.map(r=>`<tr><td>${r.unit}</td><td>${r.count}</td></tr>`).join("")}</table></div></section></div><aside class="grid"><section class="card"><h3>Admin checklist</h3><div class="queue" style="margin-top:12px"><div class="queue-item"><strong>Review pending first</strong><span>Only approved entries should be exported.</span></div><div class="queue-item"><strong>Grow the corpus</strong><span>Import word lists by domain: health, law, farming, school, transport.</span></div><div class="queue-item"><strong>Run pipeline checks</strong><span>Use production readiness before export.</span></div><div class="queue-item"><strong>Balance languages</strong><span>Prioritize low-resource queues and missing domains.</span></div></div><div class="actions"><button class="btn btn-primary" id="adminPipeline">Open Pipeline</button></div></section></aside></div>`;
  $("#export").onclick=()=>download(all.filter(e=>e.status==="approved"),"sema_approved_dataset.json");
  $("#adminCorpus").onclick=()=>{state.tab="corpus";render()};
  $("#adminPipeline").onclick=()=>{state.tab="pipeline";render()};
}
function download(data,name){const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
function bindCommon(){
  document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>{state.lang=b.dataset.lang;render()});
  const langSelect=$("#langSelect"); if(langSelect) langSelect.onchange=()=>{state.lang=langSelect.value;render()};
  document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;if(["word","phrase","sentence","term","idiom","proverb"].includes(state.mode))state.unit=state.mode;state.selectedItem=null;state.tab="work";render()});
}
function showProfile(){
  $("#profileCard").innerHTML=`<h3 style="margin:0">Contributor profile</h3><p style="color:var(--muted)">Update the basics used for attribution and routing.</p><label>Name</label><input id="pName" value="${esc(state.profile.name)}"><label>County / region</label><input id="pCounty" value="${esc(state.profile.county)}"><label>Primary languages, comma separated</label><input id="pLangs" value="${state.profile.languages.map(langLabel).join(", ")}"><div class="actions"><button class="btn btn-primary" id="saveProfile">Save profile</button><button class="btn btn-secondary" id="closeProfile">Close</button></div>`;
  $("#profileModal").classList.add("show");
  $("#closeProfile").onclick=()=>$("#profileModal").classList.remove("show");
  $("#saveProfile").onclick=()=>{state.profile.name=$("#pName").value.trim()||"Contributor";state.profile.county=$("#pCounty").value.trim()||"Not set";saveProfile(state.profile);$("#profileModal").classList.remove("show");toast("Profile saved");render()};
}
function render(){
  ensureProfile();renderNav();
  const views={dashboard:renderDashboard,corpus:renderCorpus,missions:renderMissions,work:renderWork,audio:renderAudioStudio,review:()=>{state.mode="review";renderWork()},systems:renderSystems,pipeline:renderPipeline,rewards:renderRewards,leads:renderLeads,ledger:renderLedger,admin:renderAdmin};
  (views[state.tab]||renderDashboard)();
}
$("#profileBtn").onclick=showProfile;
$("#profileModal").onclick=e=>{if(e.target.id==="profileModal")$("#profileModal").classList.remove("show")};
render();
</script>
</body>
</html>
