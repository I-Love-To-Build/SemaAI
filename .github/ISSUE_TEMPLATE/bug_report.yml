name: Bug report
description: Report something broken in the Sema AI platform.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Contributor portal
        - Reviewer portal
        - Admin portal
        - Client API
        - Supabase/database
        - Audio recording/upload
        - Authentication
        - Deployment/CI
        - Documentation
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, phone/computer, OS, URL, account role.
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Remove secrets, tokens, private audio, and personal data.
